name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: frontend
        run: bunx vue-tsc -b

      - name: Test
        working-directory: frontend
        run: bun run test

      - name: Build
        working-directory: frontend
        run: bun run build

  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Check workspace
        run: cargo check --workspace

      - name: Test backend
        run: cargo test -p backend -- --nocapture

      - name: Test WASM crate
        run: cargo test -p query-engine-wasm

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Check WASM target
        run: cargo check -p query-engine-wasm --target wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Check WASM package size
        run: WASM_PACK="$HOME/.cargo/bin/wasm-pack" scripts/check-wasm-package.sh
